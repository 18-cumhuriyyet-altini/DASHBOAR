<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeMining — Canlı Sensor Paneli</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --background: #fafaf8;
    --surface: #ffffff;
    --surface-muted: #f7f7f5;
    --foreground: #1a1a18;
    --muted-foreground: #6b6b66;
    --subtle-foreground: #9a9a94;
    --border: #e8e8e4;
    --border-strong: #d5d5cf;
    --accent: #3d4a72;

    --safe: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --safe-soft: rgba(22,163,74,0.10);
    --warn-soft: rgba(217,119,6,0.10);
    --danger-soft: rgba(220,38,38,0.10);

    --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --shadow-hairline: 0 1px 2px rgba(15,15,12,0.04);
    --shadow-lift: 0 2px 10px rgba(15,15,12,0.07);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: var(--background); color: var(--foreground);
    font-family: var(--font-sans); -webkit-font-smoothing: antialiased;
  }
  .font-mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .micro-label {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted-foreground); line-height: 1;
  }
  .card-surface { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-hairline); }

  header.topbar {
    position: sticky; top: 0; z-index: 30;
    border-bottom: 1px solid var(--border);
    background: rgba(250,250,248,0.9); backdrop-filter: blur(10px);
  }
  .topbar-inner {
    max-width: 1320px; margin: 0 auto; height: 56px; padding: 0 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo { width: 26px; height: 26px; object-fit: contain; }
  .brand .name { font-size: 13px; font-weight: 600; }
  .brand .name .ver { color: var(--subtle-foreground); font-weight: 400; }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot.safe { background: var(--safe); } .dot.warn { background: var(--warn); } .dot.danger { background: var(--danger); }
  .dot.off { background: var(--subtle-foreground); }
  .status-pill .label { font-size: 12px; font-weight: 600; }
  .status-pill.safe { background: var(--safe-soft); } .status-pill.warn { background: var(--warn-soft); } .status-pill.danger { background: var(--danger-soft); }
  .status-pill.safe .label { color: var(--safe); } .status-pill.warn .label { color: var(--warn); } .status-pill.danger .label { color: var(--danger); }
  .status-pill.offline { background: var(--surface-muted); }
  .status-pill.offline .label { color: var(--subtle-foreground); }
  .dot.offline { background: var(--subtle-foreground); }

  .right-meta { margin-left: auto; display: flex; align-items: center; gap: 18px; font-size: 12px; color: var(--muted-foreground); }
  .right-meta .item { display: flex; align-items: center; gap: 6px; }
  .conn-dot { width: 6px; height: 6px; border-radius: 50%; }
  .conn-dot.live { background: var(--safe); animation: pulse 1.6s infinite; }
  .conn-dot.off { background: var(--subtle-foreground); }
  .conn-dot.err { background: var(--danger); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }

  main { max-width: 1320px; margin: 0 auto; padding: 24px 20px 60px; }
  .layout { display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 24px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .tier-counts { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--muted-foreground); margin-left: 14px; }
  .tier-counts .tc { display: flex; align-items: center; gap: 5px; }
  .tier-counts .tc .d { width: 6px; height: 6px; border-radius: 50%; }

  .empty-state {
    border: 1px dashed var(--border-strong); border-radius: 10px;
    padding: 56px 20px; text-align: center; color: var(--muted-foreground); background: var(--surface);
  }
  .empty-state .big { font-size: 14px; color: var(--foreground); margin-bottom: 6px; font-weight: 500; }

  .rows { display: flex; flex-direction: column; gap: 10px; }

  .row {
    background: var(--surface); border: 1px solid var(--border); border-left: 3px solid transparent;
    border-radius: 8px; box-shadow: var(--shadow-hairline); overflow: hidden;
    transition: border-color .2s;
  }
  .row.safe { border-left-color: transparent; }
  .row.warn { border-left-color: var(--warn); }
  .row.danger { border-left-color: var(--danger); }
  .row.offline { border-left-color: var(--border-strong); opacity: 0.6; }

  .row-head {
    display: grid; grid-template-columns: 200px minmax(0,1fr) auto; align-items: center; gap: 16px;
    padding: 14px 16px; cursor: pointer; user-select: none;
  }
  .row-head:hover { background: var(--surface-muted); }
  .identity { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .identity .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .identity .txt { min-width: 0; }
  .identity .txt .nm { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .identity .txt .sub { font-size: 11px; color: var(--subtle-foreground); display: flex; gap: 6px; }

  .vitals {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 14px;
  }
  .vital .lbl { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--subtle-foreground); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
  .vital .lbl .d { width: 4px; height: 4px; border-radius: 50%; margin-left: auto; }
  .vital .val { font-size: 15px; font-weight: 600; }
  .vital .val .unit { font-size: 10.5px; color: var(--subtle-foreground); font-weight: 400; margin-left: 2px; }

  .row-right { display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 10.5px; font-weight: 500; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
  .badge.safe { background: var(--safe-soft); color: var(--safe); }
  .badge.warn { background: var(--warn-soft); color: var(--warn); }
  .badge.danger { background: var(--danger-soft); color: var(--danger); }
  .badge.offline { background: var(--surface-muted); color: var(--subtle-foreground); }
  .chev { color: var(--subtle-foreground); transition: transform .2s; }
  .chev.open { transform: rotate(180deg); }

  .row-detail {
    max-height: 0; overflow: hidden; transition: max-height .25s ease;
    background: var(--surface-muted); border-top: 1px solid var(--border);
  }
  .row-detail.open { max-height: 900px; }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 14px 16px;
  }
  .dcard { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 11px; }
  .dcard .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .dcard .top .lbl { font-size: 10.5px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .05em; }
  .dcard .top .tag { font-size: 9.5px; font-weight: 500; padding: 2px 7px; border-radius: 999px; }
  .dcard .top .tag.safe { background: var(--safe-soft); color: var(--safe); }
  .dcard .top .tag.warn { background: var(--warn-soft); color: var(--warn); }
  .dcard .top .tag.danger { background: var(--danger-soft); color: var(--danger); }
  .dcard .value { font-size: 20px; font-weight: 600; }
  .dcard .value .unit { font-size: 11px; color: var(--subtle-foreground); font-weight: 400; }
  .dcard canvas { width: 100%; height: 28px; margin-top: 8px; display: block; }

  /* Alert panel */
  .alert-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow-hairline); position: sticky; top: 76px; }
  .alert-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .alert-head .t { font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .alert-head .n { font-size: 11px; color: var(--subtle-foreground); }
  .counts { display: flex; gap: 8px; padding: 14px 16px; }
  .count-box { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .count-box .lbl { font-size: 10px; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  .count-box .lbl .d { width: 6px; height: 6px; border-radius: 50%; }
  .count-box .num { font-size: 20px; font-weight: 700; }
  .count-box .sub { font-size: 10px; color: var(--subtle-foreground); }

  .alert-list { max-height: 480px; overflow-y: auto; padding: 4px 0 10px; }
  .alert-item { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .alert-item:last-child { border-bottom: none; }
  .alert-item .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
  .alert-item .sensor { font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .alert-item .sensor .d { width: 6px; height: 6px; border-radius: 50%; }
  .alert-item .time { font-size: 10.5px; color: var(--subtle-foreground); }
  .alert-item .who { font-size: 11px; color: var(--muted-foreground); }
  .alert-item .val { font-size: 11px; font-weight: 600; }
  .alert-item .val.warn { color: var(--warn); } .alert-item .val.danger { color: var(--danger); }

  .no-alerts { padding: 40px 16px; text-align: center; color: var(--subtle-foreground); font-size: 12.5px; }
  .no-alerts .ico { font-size: 22px; margin-bottom: 8px; }

  footer.foot {
    max-width: 1320px; margin: 0 auto; padding: 18px 20px 0; display: flex; justify-content: space-between;
    flex-wrap: wrap; gap: 8px; color: var(--subtle-foreground); font-size: 10.5px;
  }
</style>
</head>

<script>
const SUPABASE_URL = "https://vwohifibqfbkcfmlsjzh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3b2hpZmlicWZia2NmbWxzanpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxODc2NzYsImV4cCI6MjA5ODc2MzY3Nn0.fu4xoWwSTREvvFb0LI3KS_KbjdaVaLY_BMX1pq_q5TE";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const HISTORY_LEN = 30;
const MAX_ALERTS = 40;

const SENSOR_DEFS = [
  { key: "heart_rate_bpm",    label: "Nəbz",            unit: "bpm", evaluate: rangeBand([55,105],[40,140]) },
  { key: "mlx_object_temp",   label: "Bədən Temp.",     unit: "°C",  evaluate: rangeBand([35.5,37.8],[34,39]), decimals: 1 },
  { key: "mq4_methane",       label: "Metan (CH₄)",     unit: "raw", evaluate: highBand(1200, 2200) },
  { key: "mq7_co",            label: "Karbonmonoksit",  unit: "raw", evaluate: highBand(1200, 2200) },
  { key: "mq135_air_quality", label: "Hava Keyfiyyəti", unit: "raw", evaluate: highBand(1200, 2200) },
  { key: "temperature_dht",   label: "Hava Temp.",      unit: "°C",  evaluate: rangeBand([10,32],[5,40]), decimals: 1 },
  { key: "humidity_dht",      label: "Rütubət",         unit: "%",   evaluate: rangeBand([25,80],[15,90]) },
  { key: "bmp_pressure",      label: "Hava Təzyiqi",    unit: "hPa", evaluate: null /* dinamik - aşağıya bax */ },
];
const KEY_VITALS = SENSOR_DEFS.slice(0, 5); // sətir başlığında görünən qısa siyahı

function highBand(warn, danger) { return v => v >= danger ? "danger" : v >= warn ? "warn" : "safe"; }
function rangeBand(safeR, warnR) { return v => (v < warnR[0] || v > warnR[1]) ? "danger" : (v < safeR[0] || v > safeR[1]) ? "warn" : "safe"; }
function worst(levels) { return levels.includes("danger") ? "danger" : levels.includes("warn") ? "warn" : "safe"; }
function levelLabel(l) { return l === "danger" ? "Kritik" : l === "warn" ? "Xəbərdarlıq" : l === "offline" ? "Oflayn" : "Normal"; }
const OFFLINE_MS = 20000; // ~4x göndərmə intervalı (5s) - bundan uzun sükut = oflayn
function fmt(v, d) { return (v === null || v === undefined) ? "—" : Number(v).toLocaleString("az-AZ", { minimumFractionDigits: d||0, maximumFractionDigits: d||0 }); }

// --- Təzyiq üçün dinamik baseline (məkandan asılı olmayan avtomatik kalibrasiya) ---
// İlk ~20 oxunuş: cari yerin orta təzyiqini "öyrənir" (kumulyativ orta).
// Sonra: yavaş EMA ilə tədricən uyğunlaşır (real hava dəyişikliyinə tolerantlıdır),
// amma KƏSKİN dəyişiklik (məsələn cihazın başqa yüksəkliyə aparılması və ya
// real təhlükə) dərhal Xəbərdarlıq/Kritik kimi göstərilir.
const pressureBaselines = {}; // device_id -> { value, count }
function pressureLevel(id, v) {
  if (v == null) return "safe";
  let b = pressureBaselines[id];
  if (!b) { b = pressureBaselines[id] = { value: v, count: 1 }; return "safe"; }

  const deviation = v - b.value;

  // baseline-ı yenilə (yeni dəyəri daxil etməzdən əvvəl cari sapmanı qiymətləndiririk)
  if (b.count < 20) {
    b.value = (b.value * b.count + v) / (b.count + 1);
    b.count++;
  } else {
    b.value = b.value * 0.98 + v * 0.02; // yavaş EMA
  }

  const abs = Math.abs(deviation);
  if (abs > 20) return "danger";
  if (abs > 10) return "warn";
  return "safe";
}
function getLevel(id, s, v) {
  if (s.key === "bmp_pressure") return pressureLevel(id, v);
  return (v == null) ? "safe" : s.evaluate(v);
}

const deviceStore = {};      // device_id -> { histories, latest }
const prevLevels = {};       // device_id -> { sensorKey: level }
const openRows = {};         // device_id -> bool (expanded?)
let alerts = [];
let totalRows = 0;

function ensureDevice(id) {
  if (!deviceStore[id]) {
    deviceStore[id] = { histories: {}, latest: null, latestLevels: {} };
    SENSOR_DEFS.forEach(s => deviceStore[id].histories[s.key] = []);
    openRows[id] = false;
  }
  return deviceStore[id];
}
function pushHist(arr, v) { arr.push(v); if (arr.length > HISTORY_LEN) arr.shift(); }

function applyRow(row) {
  const id = row.device_id || "unknown";
  const dev = ensureDevice(id);
  dev.latest = row;
  SENSOR_DEFS.forEach(s => { const v = row[s.key]; if (v !== null && v !== undefined) pushHist(dev.histories[s.key], v); });

  // alert generation (level transitions)
  const prev = prevLevels[id] || {};
  const cur = {};
  SENSOR_DEFS.forEach(s => {
    const v = row[s.key];
    const level = getLevel(id, s, v);
    cur[s.key] = level;
    if (level !== "safe" && prev[s.key] !== level) {
      alerts.unshift({
        id: id + "-" + s.key + "-" + Date.now(),
        time: new Date(row.created_at || Date.now()),
        sensor: s.label,
        value: fmt(v, s.decimals) + " " + s.unit,
        level, deviceId: id,
      });
    }
  });
  prevLevels[id] = cur;
  dev.latestLevels = cur; // render() bunu yenidən hesablamadan istifadə edəcək (baseline-ı ikinci dəfə pozmasın deyə)
  alerts = alerts.slice(0, MAX_ALERTS);
}

function drawSpark(canvas, data, level) {
  if (!canvas || data.length < 2) return;
  const ctx = canvas.getContext("2d");
  const w = canvas.width = canvas.clientWidth * 2;
  const h = canvas.height = canvas.clientHeight * 2;
  ctx.clearRect(0,0,w,h);
  const min = Math.min(...data), max = Math.max(...data), range = (max - min) || 1;
  const color = level === "danger" ? "#dc2626" : level === "warn" ? "#d97706" : "#16a34a";
  ctx.beginPath();
  data.forEach((v,i) => {
    const x = (i/(data.length-1)) * w;
    const y = h - ((v-min)/range) * (h*0.75) - h*0.12;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = "round"; ctx.stroke();
}

function timeAgo(d) {
  const s = Math.max(0, Math.floor((Date.now() - d.getTime())/1000));
  if (s < 60) return s + "s əvvəl";
  return Math.floor(s/60) + "d əvvəl";
}
function timeHM(d) { return d.toLocaleTimeString("az-AZ", {hour:"2-digit", minute:"2-digit", second:"2-digit"}); }

function toggleRow(id) {
  openRows[id] = !openRows[id];
  render();
}
window.toggleRow = toggleRow;

function render() {
  const ids = Object.keys(deviceStore);
  document.getElementById("rowCountMeta").textContent = totalRows + " oxunuş";

  const allRowsData = ids.map(id => {
    const dev = deviceStore[id];
    const row = dev.latest || {};
    const lastSeenMs = row.created_at ? new Date(row.created_at).getTime() : 0;
    const isOffline = (Date.now() - lastSeenMs) > OFFLINE_MS;
    const overall = isOffline ? "offline" : worst(SENSOR_DEFS.map(s => (dev.latestLevels && dev.latestLevels[s.key]) || "safe"));
    return { id, dev, row, overall, isOffline };
  });

  // Oflayn cihazlar tamamilə gizlədilir - elə bil heç mövcud deyil
  const rowsData = allRowsData
    .filter(r => !r.isOffline)
    .sort((a,b) => ({danger:0,warn:1,safe:2}[a.overall]) - ({danger:0,warn:1,safe:2}[b.overall]));

  document.getElementById("emptyState").style.display = rowsData.length ? "none" : "block";
  document.getElementById("deviceCount").textContent = rowsData.length;

  const counts = { safe:0, warn:0, danger:0 };
  rowsData.forEach(r => counts[r.overall]++);
  document.getElementById("cSafe").textContent = counts.safe;
  document.getElementById("cWarn").textContent = counts.warn;
  document.getElementById("cDanger").textContent = counts.danger;
  document.getElementById("dangerCount").textContent = counts.danger;
  document.getElementById("warnCount").textContent = counts.warn;

  const overallSystem = rowsData.length === 0 ? "safe" : worst(rowsData.map(r => r.overall));

  document.getElementById("rows").innerHTML = rowsData.map(r => {
    const isOpen = !!openRows[r.id];
    const vitalsHtml = KEY_VITALS.map(s => {
      const v = r.row[s.key];
      const level = (r.dev.latestLevels && r.dev.latestLevels[s.key]) || "safe";
      const color = level==="danger" ? "var(--danger)" : level==="warn" ? "var(--warn)" : "var(--safe)";
      return `<div class="vital">
        <div class="lbl">${s.label}<span class="d" style="background:${color}"></span></div>
        <div class="val">${fmt(v, s.decimals)}<span class="unit">${s.unit}</span></div>
      </div>`;
    }).join("");

    const detailHtml = SENSOR_DEFS.map(s => {
      const v = r.row[s.key];
      const level = (r.dev.latestLevels && r.dev.latestLevels[s.key]) || "safe";
      return `<div class="dcard">
        <div class="top"><span class="lbl">${s.label}</span><span class="tag ${level}">${levelLabel(level)}</span></div>
        <div class="value">${fmt(v, s.decimals)} <span class="unit">${s.unit}</span></div>
        <canvas data-spark="${r.id}::${s.key}"></canvas>
      </div>`;
    }).join("");

    return `
      <div class="row ${r.overall}">
        <div class="row-head" onclick="toggleRow('${r.id}')">
          <div class="identity">
            <span class="dot" style="background:${r.overall==='danger'?'var(--danger)':r.overall==='warn'?'var(--warn)':r.overall==='offline'?'var(--subtle-foreground)':'var(--safe)'}"></span>
            <div class="txt">
              <div class="nm">Cihaz</div>
              <div class="sub"><span class="font-mono">${r.id}</span>${r.isOffline ? ` · <span>son görüldü: ${timeAgo(new Date(r.row.created_at||Date.now()))}</span>` : ''}</div>
            </div>
          </div>
          <div class="vitals">${vitalsHtml}</div>
          <div class="row-right">
            <span class="badge ${r.overall}">${levelLabel(r.overall)}</span>
            <span class="chev ${isOpen?'open':''}">▾</span>
          </div>
        </div>
        <div class="row-detail ${isOpen?'open':''}">
          <div class="detail-grid">${detailHtml}</div>
        </div>
      </div>`;
  }).join("");

  rowsData.forEach(r => {
    if (!openRows[r.id]) return;
    SENSOR_DEFS.forEach(s => {
      const canvas = document.querySelector(`canvas[data-spark="${r.id}::${s.key}"]`);
      const level = (r.dev.latestLevels && r.dev.latestLevels[s.key]) || "safe";
      drawSpark(canvas, r.dev.histories[s.key], level);
    });
  });

  const alertListEl = document.getElementById("alertList");
  document.getElementById("alertLogCount").textContent = alerts.length + " log";
  if (alerts.length === 0) {
    alertListEl.innerHTML = `<div class="no-alerts"></div>`;
  } else {
    alertListEl.innerHTML = alerts.map(a => `
      <div class="alert-item">
        <div class="top">
          <span class="sensor"><span class="d" style="background:${a.level==='danger'?'var(--danger)':'var(--warn)'}"></span>${a.sensor}</span>
          <span class="time">${timeHM(a.time)}</span>
        </div>
        <div class="top">
          <span class="who">Cihaz · ${a.deviceId}</span>
          <span class="val ${a.level}">${a.value}</span>
        </div>
      </div>`).join("");
  }

  if (ids.length > 0) {
    // (yeniləndi etiketi art\u0131q g\u00f6st\u0259rilmir)
  }
}

function setConn(state, text) {
  document.getElementById("connDot").className = "conn-dot " + state;
  document.getElementById("connText").textContent = text;
}

async function loadInitial() {
  setConn("off", "Yüklənir...");
  const { data, error } = await client.from("sensor_readings").select("*").order("created_at", { ascending: false }).limit(300);
  if (error) { setConn("err", "Xəta: " + error.message); return; }
  const rows = (data || []).slice().reverse();
  rows.forEach(applyRow);
  totalRows = rows.length;
  alerts = []; // ilkin yükləmədə köhnə tarixi alert kimi göstərmə, yalnız canlı keçidləri izlə
  render();
  setConn("live", "Canlı");
}

function subscribeRealtime() {
  client.channel("sensor_readings_standalone")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "sensor_readings" }, (payload) => {
      applyRow(payload.new);
      totalRows++;
      render();
    })
    .subscribe(status => { if (status === "SUBSCRIBED") setConn("live", "Canlı"); });
}

loadInitial();
subscribeRealtime();
setInterval(() => { render(); }, 10000);
</script>
